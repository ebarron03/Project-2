server {
    listen 80;

    location / {
        return 301 /hq/;
    }

    location /hq/ {
        proxy_pass http://hq/;
    }

    location /cloud/ {
        proxy_pass http://cloud/;
    }

    location /security/ {
        proxy_pass http://security/;
    }

    location /customer/ {
        proxy_pass http://customer/;
    }

    location /research/ {
        proxy_pass http://research/;
    }
}
